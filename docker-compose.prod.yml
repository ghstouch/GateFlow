# ──────────────────────────────────────────────────────────────────────
#  GateFlow — Docker Compose (Production Snapshot)
# ──────────────────────────────────────────────────────────────────────
#
#  Isolated production instance running on port 20130.
#  Keeps the app running while you continue developing locally.
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up -d --build
#    docker compose -f docker-compose.prod.yml down
#    docker compose -f docker-compose.prod.yml logs -f
# ──────────────────────────────────────────────────────────────────────

services:
  # ── Redis (Rate Limiter Backend) ──────────────────────────────────
  redis:
    image: redis:8.6.2
    container_name: GateFlow-redis-prod
    restart: unless-stopped
    volumes:
      - redis-prod-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  GateFlow-prod:
    container_name: GateFlow-prod
    depends_on:
      redis:
        condition: service_healthy
    build:
      context: .
      target: runner-cli
    image: GateFlow:prod
    restart: unless-stopped
    stop_grace_period: 40s
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-1750}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-${PORT:-1750}}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data
    ports:
      - "${PROD_DASHBOARD_PORT:-20130}:${DASHBOARD_PORT:-${PORT:-1750}}"
      - "${PROD_API_PORT:-20131}:${API_PORT:-20129}"
    volumes:
      - GateFlow-prod-data:/app/data
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  GateFlow-prod-data:
    name: GateFlow-prod-data
  redis-prod-data:
    name: redis-prod-data
